<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cTUI WASM Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .terminal-container {
            background: #000;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }
        .terminal-button { width: 12px; height: 12px; border-radius: 50%; }
        .terminal-button.close { background: #ff5f57; }
        .terminal-button.minimize { background: #ffbd2e; }
        .terminal-button.maximize { background: #28c840; }
        .terminal-title { flex: 1; text-align: center; color: #888; font-size: 13px; }
        #terminal {
            display: block;
            background: #000;
            border-radius: 4px;
            cursor: text;
        }
        #terminal:focus { outline: 2px solid #0078d4; outline-offset: 2px; }
        .instructions { color: #888; margin-top: 20px; font-size: 14px; text-align: center; }
        .instructions code { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; }
        .loading { color: #28c840; font-family: monospace; font-size: 16px; padding: 100px 150px; }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-button close"></div>
            <div class="terminal-button minimize"></div>
            <div class="terminal-button maximize"></div>
            <div class="terminal-title">cTUI WASM Terminal</div>
        </div>
        <canvas id="terminal" tabindex="0" width="800" height="500">
            <div class="loading">Loading WASM module...</div>
        </canvas>
    </div>
    <div class="instructions">
        <p>Type to interact | Arrow keys to move | Press <code>Q</code> or <code>Esc</code> to clear</p>
    </div>
    <script src="index.js" type="module"></script>
</body>
</html>
